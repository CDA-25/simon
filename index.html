<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Jeu Simon</title>
  </head>
  <body>
    <h1>Bienvenue sur notre jeu Simon !</h1>
    <div class="btn">
      <button class="btnJouer">Jouer</button>
    </div>
    <div class="msgActifPlayer">
      <p>Appuyer sur 'Jouer' pour commencer ...</p>
    </div>

    <div class="container1">
      <div class="container red"></div>
      <div class="container green"></div>
    </div>
    <div class="container2">
      <div class="container blue"></div>
      <div class="container yellow"></div>
    </div>

    <div class="containerScore">
      <h2>SCORES</h2>
      <p class="score"></p>
    </div>
    <!-- We want all the html load before we load the js, because it's contains to some elements of the page -->
    <script src="./js/app.js"></script>
  </body>
</html>
