<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon say's</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <h1>Simon Say's</h1>
        <button id="btnPlay">Play</button>

        <div id="score">Score: 0</div>
        <div id="timer">Temps restant: 5s</div>
        <div id="messageBox"></div>

        <div class="gridBoxes gridBoxesDark">
            <div class="box boxRed" data-color="Red">
                <p>Red</p>
            </div>

            <div class="box boxBlue" data-color="Blue">
                <p>Blue</p>
            </div>

            <div class="box boxGreen" data-color="Green">
                <p>Green</p>
            </div>

            <div class="box boxYellow" data-color="Yellow">
                <p>Yellow</p>
            </div>
        </div>


    </main>

</body>

</html>
